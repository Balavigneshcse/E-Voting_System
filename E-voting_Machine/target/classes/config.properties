# ═══════════════════════════════════════════════════════════
#  E-Voting Machine Client — Configuration
#  Edit SERVER_URL below to match your server address
# ═══════════════════════════════════════════════════════════

# ── FOR LOCAL TESTING (both laptops on same WiFi) ──────────
# SERVER_URL=http://192.168.1.X:8080
# (Replace X with server laptop's local IP — run "ipconfig" on server laptop to find it)

# ── FOR INTERNET TESTING (different networks) ──────────────
# SERVER_URL=https://abc123.ngrok-free.app
# (Replace with your ngrok URL — see README for setup)

# ── CURRENT SETTING ───────────────────────────────────────
SERVER_URL=http://localhost:8080

# Machine identity (shown in server logs)
MACHINE_ID=PI-WARD-01

# Secret key — must match evoting.machine-secret in server's application.properties
MACHINE_SECRET=machine@evoting2025

# Admin key — for admin login screen
ADMIN_KEY=admin@evoting123

# Session timeout in seconds (machine auto-cancels if voter is idle)
SESSION_TIMEOUT_SECONDS=120

# Simulate fingerprint (true = always accept, false = use scanner SDK)
SIMULATE_FINGERPRINT=true
