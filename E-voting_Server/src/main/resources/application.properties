spring.application.name=evoting-backend

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/votingdb
spring.datasource.username=postgres
spring.datasource.password=Bala@sql

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ── Server ────────────────────────────────────────────────
server.port=8080

# ── Machine API Security Keys ─────────────────────────────
# Machine laptops / Pi devices must send this secret to /api/machine/register
evoting.machine-secret=machine@evoting2025

# Admin dashboard must include this key in X-Admin-Key header
evoting.admin-key=admin@evoting123

# ── Logging ───────────────────────────────────────────────
logging.level.Backend=INFO
